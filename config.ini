# Configuration du Data Warehouse

[database]
# PostgreSQL Connection
host = localhost
port = 5432
database = entrepot_supermarche
user = postgres
password = postgres

# SSL (optionnel)
ssl_mode = prefer

[schemas]
staging_schema = staging
core_schema = core
analytics_schema = analytics

[etl]
# Configuration du pipeline ETL
import_batch_size = 1000
refresh_frequency_hours = 24
log_level = INFO

[data]
# Chemins des données
csv_input_path = ./data_ventes_brute.csv
backup_path = ./backups/
encoding = utf-8
csv_delimiter = ,

[performance]
# Paramètres de performance
enable_indexes = true
enable_constraints = true
analyze_after_load = true
materialized_views = false  # À passer à true pour volumétrie importante

[backup]
# Configuration des sauvegardes
enabled = true
daily_time = 03:00
retention_days = 30
compression = gzip

[logging]
# Configuration des logs
level = INFO
format = %(asctime)s - %(name)s - %(levelname)s - %(message)s
file_path = ./logs/dw.log
